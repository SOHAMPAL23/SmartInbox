version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd Frontend
        - npm install
    build:
      commands:
        - export VITE_API_URL=https://smartinbox-nopk.onrender.com/api/v1
        - export VITE_WS_URL=wss://smartinbox-nopk.onrender.com/api/v1
        - npm run build
  artifacts:
    baseDirectory: Frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - Frontend/node_modules/**/*
customRules:
  - source: "/<*>"
    target: /index.html
    status: '200'
